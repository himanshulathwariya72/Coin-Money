ho)","Aapka data Firebase (Google) ke secure servers pe store hota hai.","Hum aapka personal data kisi third party ko sell nahi karte.","Poori details ke liye Privacy Policy zaroor padho."]},{title:"7. Liability Disclaimer",content:["Coin Money ek entertainment app hai — yeh koi financial investment platform nahi hai.","Hum guarantee nahi dete ki app hamesha available rahega ya error-free rahega.","Technical issues, server downtime, ya data loss ke liye hum legally responsible nahi hain.","Game results random hote hain — kisi specific result ki guarantee nahi di jaa sakti.","App use karna aapki apni marzi aur zimmedari hai.","Hum kabhi bhi app band kar sakte hain, features change kar sakte hain bina pehle notice diye."]},{title:"8. Age Restriction",content:["Yeh app sirf 18 saal ya usse upar ke users ke liye hai.","18 saal se kam umra ke log app use nahi kar sakte.","Agar hume pata chala ki koi minor app use kar raha hai, toh hum us account ko turant delete kar denge."]},{title:"9. Contact Karo",content:["Koi bhi sawaal ho toh humse contact karo:","📧 Email: admin@coinmoney.com","App mein Profile → Contact Us button se bhi reach kar sakte ho.","Hum 2–3 business days mein reply karte hain."]}];function kD(){const[,i]=zn();return p.jsx("div",{className:"min-h-screen bg-gradient-to-br from-[#0a0e1a] via-[#0d1526] to-[#0a0e1a]",children:p.jsxs("div",{className:"max-w-2xl mx-auto px-4 py-6 pb-12",children:[p.jsxs("div",{className:"flex items-center gap-3 mb-6",children:[p.jsx("button",{onClick:()=>i("/profile"),className:"w-9 h-9 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-colors",children:p.jsx(pa,{className:"w-4 h-4 text-white"})}),p.jsxs("div",{children:[p.jsx("h1",{className:"text-white font-bold text-xl",children:"Terms of Service"}),p.jsx("p",{className:"text-slate-400 text-xs",children:"Last updated: May 2026"})]})]}),p.jsxs("div",{className:"bg-indigo-500/10 border border-indigo-500/20 rounded-2xl p-5 ta Kyun Collect Karte Hain",content:["Aapka data sirf inn kamon ke liye use hota hai:","→ Account banane aur login karne ke liye","→ Aapki coins balance track karne ke liye","→ Withdrawal process karne ke liye","→ Daily ad limit enforce karne ke liye (cheating rokne ke liye)","→ Admin panel mein user management ke liye","Hum aapka data marketing ya advertising ke liye use NAHI karte."]},{title:"4. Data Kahan Store Hota Hai",content:["Aapka saara data Google Firebase ke secure servers pe store hota hai.","Firebase Google LLC ka product hai jo world-class security standards follow karta hai.","Data encrypted form mein store hota hai aur transfer ke dauran bhi SSL/TLS encryption use hoti hai.","Firebase ki apni Privacy Policy: firebase.google.com/support/privacy"]},{title:"5. Data Sharing — Hum Kisi Ko Nahi Dete",content:["🚫 Hum aapka data kisi advertiser ko NAHI dete","🚫 Hum aapka data kisi third-party company ko sell NAHI karte","🚫 Hum aapki personal information publicly share NAHI karte","Sirf yeh cases mein data share ho sakta hai:","→ Agar court ya government authority legally maange","→ Fraud ya cheating investigate karne ke liye internally"]},{title:"6. Cookies aur Analytics",content:["Hum Firebase Analytics use karte hain app performance track karne ke liye.","Yeh sirf anonymous usage data collect karta hai jaise kitne log app use kar rahe hain.","Koi personal identifiable information analytics mein nahi jati.","Aap apne browser settings se analytics opt-out kar sakte ho."]},{title:"7. Aapke Adhikar (Your Rights)",content:["Aapke paas yeh adhikar hain apne data ke baare mein:","✅ Data dekhna — apna saara data dekh sakte ho","✅ Data sudharna — galat information correct karwa sakte ho","✅ Data delete karna — account delete karwa sakte ho (admin@coinmoney.com pe likhkho)","✅ Data export — apna data export karwa sakte ho","Request ke liye humse contact karo: admin@coinmoney.com","Hum 7 business days mein request process karte hain."]},{title:"8. Data Kitne Samay Tak Rakha Jata Hai",content:["Active account ka data tab tak rakha jata hai jab tak account active hai.","Account delete karne par 30 din mein saara data permanently delete ho jata hai.","Withdrawal records legally 1 saal ke liye rakhe jaate hain (tax aur audit ke liye)."]},{title:"9. Children ki Privacy",content:["Yeh app sirf 18 saal ya usse upar ke users ke liye hai.","Hum jaanboojhkar 18 saal se kam umra ke bachchon ka data collect nahi karte.","Agar aapko lagta hai koi minor is app ka use kar raha hai, toh hume turant batao."]},{title:"10. Security",content:["Aapke account ki security ke liye hum yeh karte hain:","🔒 Firebase Authentication — industry-standard secure login","🔒 Firestore Security Rules — sirf authorized access","🔒 Transactions — coins deduct/add sirf Firestore transactions ke zariye","🔒 HTTPS — saara data encrypted connection se transfer hota hai","Phir bhi, apna password strong rakho aur kisi ke saath share mat karo."]},{title:"11. Policy mein Changes",content:["Hum kabhi bhi yeh Privacy Policy update kar sakte hain.","Koi bada change hone par hum app mein notification dikhayenge.","Updated policy ki date upar 'Last updated' mein dikhti hai.","App continue karna = updated policy se agreement."]},{title:"12. Humse Contact Karo",content:["Privacy se related koi bhi sawaal ya concern ke liye:","📧 Email: admin@coinmoney.com","Profile → Contact Us button se bhi reach kar sakte ho.","Hum 2–3 business days mein reply karte hain."]}];function OD(){const[,i]=zn();return p.jsx("div",{className:"min-h-screen bg-gradient-to-br from-[#0a0e1a] via-[#0d1526] to-[#0a0e1a]",children:p.jsxs("div",{className:"max-w-2xl mx-auto px-4 py-6 pb-12",children:[p.jsxs("div",{className:"flex items-center gap-3 mb-6",children:[p.jsx("button",{onClick:()=>i("/profile"),className:"w-9 h-9 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-colors",children:p.jsx(pa,{className:"w-4 h-4 text-white"})}),p.jsxs("div",{children:
